name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    name: Validate app metadata + ELFs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate every app directory
        run: python3 scripts/validate.py

  pr-scope:
    name: One app per PR + no infra changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check PR only touches one app directory
        run: |
          git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" \
            | python3 scripts/check_pr_scope.py

  index:
    name: Regenerate index.json
    needs: validate
    # Only auto-commit the regenerated index on merge to main, never on PRs
    # (a PR from a fork has no write token anyway).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      # Branch protection requires status checks on every commit landing on
      # main - the default GITHUB_TOKEN pushes as github-actions[bot], which
      # isn't an admin and gets rejected ("2 of 2 required status checks are
      # expected") since this freshly-created commit was never itself run
      # through CI. BOT_PUSH_TOKEN is a PAT for the repo owner (an actual
      # admin - enforce_admins is off), so its push bypasses the check
      # requirement the same way a manual admin push would.
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_PUSH_TOKEN }}
      - name: Regenerate index.json
        run: python3 scripts/generate_index.py
      - name: Commit if changed
        run: |
          if ! git diff --quiet -- index.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.json
            git commit -m "ci: regenerate index.json"
            git push
          else
            echo "index.json already up to date"
          fi
